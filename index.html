<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>eWebWorld | Custom Built IT Solutions</title>
    <link rel="icon" href="https://rest.techbehemoths.com/storage/images/companies/54305/86fec33a04e29083599f674bf4d8f672.png" type="image/png" />
    <script>
      (function() {
        try {
          var savedTheme = localStorage.getItem('ewebworld-theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
